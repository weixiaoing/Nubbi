services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.runtime
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    expose:
      - "4000"
      - "4040"
    volumes:
      - server_storage:/app/storage
    restart: unless-stopped

volumes:
  server_storage:
