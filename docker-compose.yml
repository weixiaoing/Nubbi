services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "${WEB_PORT:-80}:80/tcp"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./server/.env
    ports:
      - "${SERVER_PORT:-4000}:4000/tcp"
      - "${SOCKET_PORT:-4040}:4040/tcp"
    expose:
      - "4000"
      - "4040"
    volumes:
      - server_storage:/app/server/storage
    restart: unless-stopped

volumes:
  server_storage:
