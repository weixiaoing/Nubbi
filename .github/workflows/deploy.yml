name: Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: master

concurrency:
  group: deploy-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:4000' }}
      VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'http://127.0.0.1:4040' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            client/pnpm-lock.yaml
            server/pnpm-lock.yaml

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Lint client
        run: pnpm --dir client lint

      - name: Build client
        run: pnpm --dir client build

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Typecheck server
        run: pnpm --dir server typecheck

      - name: Build Docker images
        run: |
          docker build \
            --build-arg VITE_API_URL="$VITE_API_URL" \
            --build-arg VITE_SOCKET_URL="$VITE_SOCKET_URL" \
            -t d-note-client:verify ./client
          docker build -t d-note-server:verify ./server

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:4000' }}
      VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'http://127.0.0.1:4040' }}
      WEB_PORT: ${{ vars.WEB_PORT || '80' }}
      MONGO_URI: ${{ secrets.MONGO_URI || '' }}
      SERVER_PORT: ${{ vars.SERVER_PORT || '4000' }}
      SOCKET_PORT: ${{ vars.SOCKET_PORT || '4040' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || '' }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL || '' }}
      CLIENT_URL: ${{ vars.CLIENT_URL || '' }}
      AUTH_GITHUB_ID: ${{ vars.AUTH_GITHUB_ID || '' }}
      AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET || '' }}
      AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID || vars.AUTH_GOOLE_ID || '' }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || secrets.AUTH_GOOLE_SECRET || '' }}
      AUTH_GOOLE_ID: ${{ vars.AUTH_GOOLE_ID || '' }}
      AUTH_GOOLE_SECRET: ${{ secrets.AUTH_GOOLE_SECRET || '' }}
      EMAIL_USER: ${{ secrets.EMAIL_USER || '' }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS || '' }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM || '' }}
      EMAIL_SERVICE: ${{ vars.EMAIL_SERVICE || '' }}
      AI_CONFIG_SECRET: ${{ secrets.AI_CONFIG_SECRET || '' }}
      GH_IMAGE_REPO: ${{ vars.GH_IMAGE_REPO || '' }}
      GH_IMAGE_TOKEN: ${{ secrets.GH_IMAGE_TOKEN || '' }}
      GH_IMAGE_BRANCH: ${{ vars.GH_IMAGE_BRANCH || 'main' }}
      WEB_SEARCH_PROVIDER: ${{ vars.WEB_SEARCH_PROVIDER || '' }}
      WEB_SEARCH_API_KEY: ${{ secrets.WEB_SEARCH_API_KEY || '' }}
      WEB_SEARCH_BASE_URL: ${{ vars.WEB_SEARCH_BASE_URL || '' }}
      SMTP_HOST: ${{ vars.SMTP_HOST || '' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '' }}
      SMTP_SECURE: ${{ vars.SMTP_SECURE || '' }}
    steps:
      - name: Configure SSH
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync environment files
        shell: bash
        run: |
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            VITE_API_URL
            VITE_SOCKET_URL
            MONGO_URI
            BETTER_AUTH_SECRET
            BETTER_AUTH_URL
            CLIENT_URL
            AUTH_GITHUB_ID
            AUTH_GITHUB_SECRET
            AUTH_GOOGLE_ID
            AUTH_GOOGLE_SECRET
            EMAIL_USER
            EMAIL_PASS
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              printf '[deploy] missing required env: %s\n' "$name" >&2
              exit 1
            fi
          done

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const rootEnv = {
            VITE_API_URL: process.env.VITE_API_URL,
            VITE_SOCKET_URL: process.env.VITE_SOCKET_URL,
            WEB_PORT: process.env.WEB_PORT || '80',
            MONGO_URI: process.env.MONGO_URI,
            SERVER_PORT: process.env.SERVER_PORT || '4000',
            SOCKET_PORT: process.env.SOCKET_PORT || '4040',
            BETTER_AUTH_SECRET: process.env.BETTER_AUTH_SECRET,
            BETTER_AUTH_URL: process.env.BETTER_AUTH_URL,
            CLIENT_URL: process.env.CLIENT_URL,
            AUTH_GITHUB_ID: process.env.AUTH_GITHUB_ID,
            AUTH_GITHUB_SECRET: process.env.AUTH_GITHUB_SECRET,
            AUTH_GOOGLE_ID: process.env.AUTH_GOOGLE_ID,
            AUTH_GOOGLE_SECRET: process.env.AUTH_GOOGLE_SECRET,
            AUTH_GOOLE_ID: process.env.AUTH_GOOLE_ID || '',
            AUTH_GOOLE_SECRET: process.env.AUTH_GOOLE_SECRET || '',
            EMAIL_USER: process.env.EMAIL_USER,
            EMAIL_PASS: process.env.EMAIL_PASS,
            EMAIL_FROM: process.env.EMAIL_FROM || '',
            EMAIL_SERVICE: process.env.EMAIL_SERVICE || '',
            AI_CONFIG_SECRET: process.env.AI_CONFIG_SECRET || '',
            GH_IMAGE_REPO: process.env.GH_IMAGE_REPO || '',
            GH_IMAGE_TOKEN: process.env.GH_IMAGE_TOKEN || '',
            GH_IMAGE_BRANCH: process.env.GH_IMAGE_BRANCH || 'main',
            WEB_SEARCH_PROVIDER: process.env.WEB_SEARCH_PROVIDER || '',
            WEB_SEARCH_API_KEY: process.env.WEB_SEARCH_API_KEY || '',
            WEB_SEARCH_BASE_URL: process.env.WEB_SEARCH_BASE_URL || '',
            SMTP_HOST: process.env.SMTP_HOST || '',
            SMTP_PORT: process.env.SMTP_PORT || '',
            SMTP_SECURE: process.env.SMTP_SECURE || '',
          };

          const serialize = (value) => JSON.stringify(String(value ?? ''));
          const render = (env) =>
            Object.entries(env)
              .map(([key, value]) => `${key}=${serialize(value)}`)
              .join('\n') + '\n';

          const rootEnvPath = path.join(process.env.RUNNER_TEMP, 'd-note.root.env');
          const serverEnvPath = path.join(process.env.RUNNER_TEMP, 'd-note.server.env');

          const content = render(rootEnv);
          fs.writeFileSync(rootEnvPath, content);
          fs.writeFileSync(serverEnvPath, content);
          NODE

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH/server'"

          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" \
            "$RUNNER_TEMP/d-note.root.env" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" \
            "$RUNNER_TEMP/d-note.server.env" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/server/.env"

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && git fetch origin '$DEPLOY_BRANCH' && git checkout '$DEPLOY_BRANCH' && git pull --ff-only origin '$DEPLOY_BRANCH' && DEPLOY_BRANCH='$DEPLOY_BRANCH' bash scripts/deploy-docker.sh '$DEPLOY_BRANCH'"
