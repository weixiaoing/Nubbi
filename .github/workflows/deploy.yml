name: Deploy

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - master
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: deploy

concurrency:
  group: deploy-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL || '' }}
      VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || secrets.VITE_SOCKET_URL || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            client/pnpm-lock.yaml
            server/pnpm-lock.yaml

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Lint client
        run: pnpm --dir client lint

      - name: Build client
        run: pnpm --dir client build

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Typecheck server
        run: pnpm --dir server typecheck

      - name: Build Docker images
        run: |
          docker build -f client/Dockerfile.runtime -t d-note-client:verify ./client
          docker build -t d-note-server:verify ./server

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD || '' }}
      VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL || '' }}
      VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || secrets.VITE_SOCKET_URL || '' }}
      WEB_PORT: ${{ vars.WEB_PORT || secrets.WEB_PORT || '' }}
      MONGO_URI: ${{ secrets.MONGO_URI || '' }}
      SERVER_PORT: ${{ vars.SERVER_PORT || secrets.SERVER_PORT || '' }}
      SOCKET_PORT: ${{ vars.SOCKET_PORT || secrets.SOCKET_PORT || '' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || '' }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL || secrets.BETTER_AUTH_URL || '' }}
      CLIENT_URL: ${{ vars.CLIENT_URL || secrets.CLIENT_URL || '' }}
      AUTH_GITHUB_ID: ${{ vars.AUTH_GITHUB_ID || secrets.AUTH_GITHUB_ID || '' }}
      AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET || '' }}
      AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID || secrets.AUTH_GOOGLE_ID || vars.AUTH_GOOLE_ID || secrets.AUTH_GOOLE_ID || '' }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || secrets.AUTH_GOOLE_SECRET || '' }}
      AUTH_GOOLE_ID: ${{ vars.AUTH_GOOLE_ID || secrets.AUTH_GOOLE_ID || '' }}
      AUTH_GOOLE_SECRET: ${{ secrets.AUTH_GOOLE_SECRET || '' }}
      EMAIL_USER: ${{ secrets.EMAIL_USER || '' }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS || '' }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM || secrets.EMAIL_FROM || '' }}
      EMAIL_SERVICE: ${{ vars.EMAIL_SERVICE || secrets.EMAIL_SERVICE || '' }}
      AI_CONFIG_SECRET: ${{ secrets.AI_CONFIG_SECRET || '' }}
      GH_IMAGE_REPO: ${{ vars.GH_IMAGE_REPO || secrets.GH_IMAGE_REPO || '' }}
      GH_IMAGE_TOKEN: ${{ secrets.GH_IMAGE_TOKEN || '' }}
      GH_IMAGE_BRANCH: ${{ vars.GH_IMAGE_BRANCH || secrets.GH_IMAGE_BRANCH || 'main' }}
      WEB_SEARCH_PROVIDER: ${{ vars.WEB_SEARCH_PROVIDER || secrets.WEB_SEARCH_PROVIDER || '' }}
      WEB_SEARCH_API_KEY: ${{ secrets.WEB_SEARCH_API_KEY || '' }}
      WEB_SEARCH_BASE_URL: ${{ vars.WEB_SEARCH_BASE_URL || secrets.WEB_SEARCH_BASE_URL || '' }}
      SMTP_HOST: ${{ vars.SMTP_HOST || secrets.SMTP_HOST || '' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || secrets.SMTP_PORT || '' }}
      SMTP_SECURE: ${{ vars.SMTP_SECURE || secrets.SMTP_SECURE || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Build client assets
        run: |
          pnpm --dir client install --frozen-lockfile
          pnpm --dir client build

      - name: Configure SSH
        run: |
          test -n "$DEPLOY_HOST"
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          elif [ -z "${{ secrets.DEPLOY_PASSWORD }}" ]; then
            printf '[deploy] missing DEPLOY_SSH_KEY or DEPLOY_PASSWORD\n' >&2
            exit 1
          fi
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare SSH helpers
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/ssh-run" <<'SH'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          if [ -f "$HOME/.ssh/deploy_key" ]; then
            exec ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$@"
          fi
          exec sshpass -p "$DEPLOY_PASSWORD" ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$@"
          SH

          cat > "$RUNNER_TEMP/scp-run" <<'SH'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          source_path="$1"
          target_path="$2"
          if [ -f "$HOME/.ssh/deploy_key" ]; then
            exec scp -i "$HOME/.ssh/deploy_key" -P "$DEPLOY_PORT" "$source_path" "$DEPLOY_USER@$DEPLOY_HOST:$target_path"
          fi
          exec sshpass -p "$DEPLOY_PASSWORD" scp -P "$DEPLOY_PORT" "$source_path" "$DEPLOY_USER@$DEPLOY_HOST:$target_path"
          SH

          chmod +x "$RUNNER_TEMP/ssh-run" "$RUNNER_TEMP/scp-run"

      - name: Sync environment files
        shell: bash
        run: |
          required_vars=(
            DEPLOY_HOST
            MONGO_URI
            BETTER_AUTH_SECRET
            BETTER_AUTH_URL
            CLIENT_URL
            AUTH_GITHUB_ID
            AUTH_GITHUB_SECRET
            AUTH_GOOGLE_ID
            AUTH_GOOGLE_SECRET
            EMAIL_USER
            EMAIL_PASS
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              printf '[deploy] missing required env: %s\n' "$name" >&2
              exit 1
            fi
          done

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const rootEnv = {
            VITE_API_URL: process.env.VITE_API_URL,
            VITE_SOCKET_URL: process.env.VITE_SOCKET_URL,
            MONGO_URI: process.env.MONGO_URI,
            BETTER_AUTH_SECRET: process.env.BETTER_AUTH_SECRET,
            BETTER_AUTH_URL: process.env.BETTER_AUTH_URL,
            CLIENT_URL: process.env.CLIENT_URL,
            AUTH_GITHUB_ID: process.env.AUTH_GITHUB_ID,
            AUTH_GITHUB_SECRET: process.env.AUTH_GITHUB_SECRET,
            AUTH_GOOGLE_ID: process.env.AUTH_GOOGLE_ID,
            AUTH_GOOGLE_SECRET: process.env.AUTH_GOOGLE_SECRET,
            AUTH_GOOLE_ID: process.env.AUTH_GOOLE_ID || '',
            AUTH_GOOLE_SECRET: process.env.AUTH_GOOLE_SECRET || '',
            EMAIL_USER: process.env.EMAIL_USER,
            EMAIL_PASS: process.env.EMAIL_PASS,
            EMAIL_FROM: process.env.EMAIL_FROM || '',
            EMAIL_SERVICE: process.env.EMAIL_SERVICE || '',
            AI_CONFIG_SECRET: process.env.AI_CONFIG_SECRET || '',
            GH_IMAGE_REPO: process.env.GH_IMAGE_REPO || '',
            GH_IMAGE_TOKEN: process.env.GH_IMAGE_TOKEN || '',
            GH_IMAGE_BRANCH: process.env.GH_IMAGE_BRANCH || 'main',
            WEB_SEARCH_PROVIDER: process.env.WEB_SEARCH_PROVIDER || '',
            WEB_SEARCH_API_KEY: process.env.WEB_SEARCH_API_KEY || '',
            WEB_SEARCH_BASE_URL: process.env.WEB_SEARCH_BASE_URL || '',
            SMTP_HOST: process.env.SMTP_HOST || '',
            SMTP_PORT: process.env.SMTP_PORT || '',
            SMTP_SECURE: process.env.SMTP_SECURE || '',
          };

          if (process.env.WEB_PORT) {
            rootEnv.WEB_PORT = process.env.WEB_PORT;
          }

          if (process.env.SERVER_PORT) {
            rootEnv.SERVER_PORT = process.env.SERVER_PORT;
          }

          if (process.env.SOCKET_PORT) {
            rootEnv.SOCKET_PORT = process.env.SOCKET_PORT;
          }

          const serialize = (value) => JSON.stringify(String(value ?? ''));
          const render = (env) =>
            Object.entries(env)
              .map(([key, value]) => `${key}=${serialize(value)}`)
              .join('\n') + '\n';

          const rootEnvPath = path.join(process.env.RUNNER_TEMP, 'd-note.root.env');
          const serverEnvPath = path.join(process.env.RUNNER_TEMP, 'd-note.server.env');

          const content = render(rootEnv);
          fs.writeFileSync(rootEnvPath, content);
          fs.writeFileSync(serverEnvPath, content);
          NODE

      - name: Upload release bundle
        shell: bash
        run: |
          tar \
            --exclude='.git' \
            --exclude='client/node_modules' \
            --exclude='server/node_modules' \
            --exclude='server/storage' \
            --exclude='.pnpm-store' \
            -czf "$RUNNER_TEMP/d-note-release.tgz" .

          "$RUNNER_TEMP/ssh-run" \
            "rm -rf ~/d-note-deploy.next && mkdir -p ~/d-note-deploy.next ~/d-note-deploy/server"

          "$RUNNER_TEMP/scp-run" \
            "$RUNNER_TEMP/d-note-release.tgz" \
            "~/d-note-release.tgz"

          "$RUNNER_TEMP/ssh-run" \
            "bash -s" <<'REMOTE'
          set -Eeuo pipefail

          tar -xzf ~/d-note-release.tgz -C ~/d-note-deploy.next
          rm -f ~/d-note-release.tgz

          if [ -f ~/d-note-deploy/.env ]; then
            cp -f ~/d-note-deploy/.env ~/d-note-deploy.next/.env
          fi

          mkdir -p ~/d-note-deploy.next/server
          if [ -f ~/d-note-deploy/server/.env ]; then
            cp -f ~/d-note-deploy/server/.env ~/d-note-deploy.next/server/.env
          fi

          rm -rf ~/d-note-deploy.prev
          if [ -d ~/d-note-deploy ]; then
            mv ~/d-note-deploy ~/d-note-deploy.prev
          fi
          mv ~/d-note-deploy.next ~/d-note-deploy
          REMOTE

      - name: Upload environment files
        shell: bash
        run: |
          "$RUNNER_TEMP/ssh-run" \
            "mkdir -p ~/d-note-deploy/server"

          "$RUNNER_TEMP/scp-run" \
            "$RUNNER_TEMP/d-note.root.env" \
            "~/d-note-deploy/.env.generated"

          "$RUNNER_TEMP/ssh-run" \
            "bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd ~/d-note-deploy

          preserve_env_value() {
            key="$1"

            if [ ! -f .env ] || grep -q "^${key}=" .env.generated; then
              return
            fi

            existing_value="$(awk -F= -v key="$key" '$1 == key { print; exit }' .env)"

            if [ -n "$existing_value" ]; then
              printf '%s\n' "$existing_value" >> .env.generated
            fi
          }

          for key in WEB_PORT SERVER_PORT SOCKET_PORT; do
            preserve_env_value "$key"
          done

          mv .env.generated .env
          REMOTE

          "$RUNNER_TEMP/scp-run" \
            "$RUNNER_TEMP/d-note.server.env" \
            "~/d-note-deploy/server/.env"

      - name: Run deploy script
        run: |
          "$RUNNER_TEMP/ssh-run" \
            "cd ~/d-note-deploy && SKIP_GIT_UPDATE=1 DEPLOY_BRANCH='$DEPLOY_BRANCH' bash scripts/deploy-docker.sh '$DEPLOY_BRANCH'"
